services:
  - type: keyvalue
    name: controlled-anon-chat-kv
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: controlled-anon-chat-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: controlled-anon-chat-kv
          property: connectionString
